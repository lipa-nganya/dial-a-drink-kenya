# Cloud Build configuration for Admin Frontend - Production
# This file enables automatic deployments from GitHub main branch to Cloud Run

steps:
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        IMG="gcr.io/$PROJECT_ID/deliveryos-admin"
        docker pull "$${IMG}:latest" || true
        docker build \
          --cache-from "$${IMG}:latest" \
          -t "$${IMG}:$SHORT_SHA" \
          -t "$${IMG}:latest" \
          --build-arg REACT_APP_API_URL=https://deliveryos-production-backend-805803410802.us-central1.run.app/api \
          --build-arg REACT_APP_GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_API_KEY} \
          .

  # Push before deploy (see frontend/cloudbuild.yaml — top-level images: runs too late).
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/dialadrink-admin:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/dialadrink-admin:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'deliveryos-admin-frontend'
      - '--project'
      - '$PROJECT_ID'
      - '--image'
      - 'gcr.io/$PROJECT_ID/deliveryos-admin:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--quiet'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      # Memory/CPU boost: omit so Cloud Run keeps console settings on each deploy
      - '--set-env-vars'
      - 'REACT_APP_API_URL=https://deliveryos-production-backend-805803410802.us-central1.run.app/api,REACT_APP_GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_API_KEY}'

images:
  - 'gcr.io/$PROJECT_ID/deliveryos-admin:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/deliveryos-admin:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'

substitutions:
  _GOOGLE_MAPS_API_KEY: ''
