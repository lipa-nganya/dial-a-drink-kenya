[build]
  base = "admin-frontend"
  publish = "build"
  # CI=true matches GitHub Actions + Netlify defaults — ESLint warnings fail the build.
  command = "npm ci && CI=true npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Avoid stale SPA shells pointing at old hashed chunks after deploy (common “fix works locally only”).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
