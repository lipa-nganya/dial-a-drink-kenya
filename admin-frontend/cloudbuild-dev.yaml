# Cloud Build configuration for Admin Frontend - Development
# This file enables automatic deployments from GitHub develop branch to Cloud Run

steps:
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        IMG="gcr.io/$PROJECT_ID/deliveryos-admin-dev"
        docker pull "$${IMG}:latest" || true
        docker build \
          --cache-from "$${IMG}:latest" \
          -t "$${IMG}:$BUILD_ID" \
          -t "$${IMG}:latest" \
          --build-arg REACT_APP_API_URL=https://deliveryos-development-backend-lssctajjoq-uc.a.run.app/api \
          --build-arg REACT_APP_GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_API_KEY} \
          .

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'deliveryos-admin-frontend-dev'
      - '--image'
      - 'gcr.io/$PROJECT_ID/deliveryos-admin-dev:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      # Memory/CPU boost: omit so Cloud Run keeps console settings on each deploy
      - '--set-env-vars'
      - 'REACT_APP_API_URL=https://deliveryos-development-backend-lssctajjoq-uc.a.run.app/api,REACT_APP_GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_API_KEY}'

images:
  - 'gcr.io/$PROJECT_ID/deliveryos-admin-dev:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/deliveryos-admin-dev:latest'

options:
  machineType: 'E2_HIGHCPU_4'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'

# Substitution variables - must be set via Cloud Build trigger or --substitutions flag
substitutions:
  _GOOGLE_MAPS_API_KEY: ''  # REQUIRED: Set this in Cloud Build trigger configuration
