# Cloud Build configuration for Shop Agent Frontend
# This file enables automatic deployments from GitHub to Cloud Run

steps:
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        IMG="gcr.io/$PROJECT_ID/dialadrink-shop-agent"
        docker pull "$${IMG}:latest" || true
        docker build \
          --cache-from "$${IMG}:latest" \
          -t "$${IMG}:$SHORT_SHA" \
          -t "$${IMG}:latest" \
          --build-arg REACT_APP_API_URL=https://deliveryos-backend-p6bkgryxqa-uc.a.run.app/api \
          .

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'deliveryos-shop-agent'
      - '--image'
      - 'gcr.io/$PROJECT_ID/dialadrink-shop-agent:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # Memory/CPU: omit so Cloud Run keeps console settings on each deploy
      - '--set-env-vars'
      - 'REACT_APP_API_URL=https://deliveryos-backend-p6bkgryxqa-uc.a.run.app/api'

images:
  - 'gcr.io/$PROJECT_ID/dialadrink-shop-agent:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/dialadrink-shop-agent:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
