# Cloud Build configuration for Development Backend
# This file deploys to deliveryos-development-backend from develop branch

steps:
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        IMG="gcr.io/$PROJECT_ID/deliveryos-backend"
        docker pull "$${IMG}:latest" || true
        docker build \
          --cache-from "$${IMG}:latest" \
          -t "$${IMG}:$SHORT_SHA" \
          -t "$${IMG}:latest" \
          .

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'deliveryos-development-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/deliveryos-backend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # Memory/CPU/scaling/timeout: omit so Cloud Run keeps console settings on each deploy
      - '--add-cloudsql-instances'
      - 'dialadrink-production:us-central1:dialadrink-db-dev'
      - '--update-env-vars'
      - 'NODE_ENV=development,FRONTEND_URL=https://dialadrink.thewolfgang.tech,ADMIN_URL=https://dialadrink-admin.thewolfgang.tech,HOST=0.0.0.0'
      # Note: DATABASE_URL should be set manually or via Secret Manager

images:
  - 'gcr.io/$PROJECT_ID/deliveryos-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/deliveryos-backend:latest'

options:
  machineType: 'E2_HIGHCPU_4'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
