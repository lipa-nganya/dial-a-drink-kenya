# Cloud Build configuration for Production Backend
# This file deploys to deliveryos-production-backend from main branch
#
# Caching: pull :latest + --cache-from reuses layers; DOCKER_BUILDKIT=1 for buildx cache.
# Machine: only supported types (e.g. E2_HIGHCPU_8, E2_MEDIUM); invalid values fail gcloud builds submit.
# Registry: gcr.io — use scripts/gcp/gcr-delete-untagged-digests.sh + Artifact Registry lifecycle after migration.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        IMG="gcr.io/$PROJECT_ID/deliveryos-backend"
        docker pull "$${IMG}:latest" || true
        docker build \
          --cache-from "$${IMG}:latest" \
          -t "$${IMG}:$SHORT_SHA" \
          -t "$${IMG}:latest" \
          .

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'deliveryos-production-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/deliveryos-backend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # Memory/CPU/scaling/timeout: omit so Cloud Run keeps console settings on each deploy
      - '--add-cloudsql-instances'
      - 'dialadrink-production:us-central1:dialadrink-db-prod'
      - '--update-env-vars'
      - 'NODE_ENV=production,FRONTEND_URL=https://ruakadrinksdelivery.co.ke,ADMIN_URL=https://admin.ruakadrinksdelivery.co.ke,HOST=0.0.0.0'
      # Note: DATABASE_URL and other sensitive env vars should be set manually
      # or via Secret Manager to preserve them across deployments

images:
  - 'gcr.io/$PROJECT_ID/deliveryos-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/deliveryos-backend:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
