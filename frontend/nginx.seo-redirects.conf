# High-confidence SEO redirects from GSC 404 coverage patterns.
# Keep this include above generic SPA/product fallback locations.

# Legacy search routes -> products search page.
location ~* ^/search/(.+)$ {
    return 301 /products?search=$1;
}

# Old blog category taxonomy routes.
location ~* ^/blog/cat/ {
    return 301 /blog;
}

# Malformed repeated products segments.
location ~* ^/products/products/products/(.+)$ {
    return 301 /products/$1;
}

location ~* ^/products/products/(.+)$ {
    return 301 /products/$1;
}

# Legacy singular product route.
location ~* ^/product/(.+)$ {
    return 301 /products/$1;
}
