# Cloud Build: customer frontend → GCR → Cloud Run
#
# Builds embed the Maps key via --build-arg (_GOOGLE_MAPS_API_KEY).
# Setting GOOGLE_MAPS_API_KEY only on Cloud Run does NOT bake it into the JS; add
# substitution _GOOGLE_MAPS_API_KEY on your trigger or pass --substitutions when submitting.
#
# Build + both pushes run in ONE step so the image exists in the local daemon before push
# (avoids “image not found” when push/deploy ran in separate steps).

steps:
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        IMG="gcr.io/$PROJECT_ID/dialadrink-frontend"
        docker pull "$${IMG}:latest" || true
        docker build \
          --cache-from "$${IMG}:latest" \
          -t "$${IMG}:$SHORT_SHA" \
          -t "$${IMG}:latest" \
          --build-arg REACT_APP_API_URL=https://deliveryos-production-backend-805803410802.us-central1.run.app/api \
          --build-arg REACT_APP_GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_API_KEY} \
          .
        docker push "$${IMG}:$SHORT_SHA"
        docker push "$${IMG}:latest"

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'deliveryos-customer-frontend'
      - '--project'
      - '$PROJECT_ID'
      - '--image'
      - 'gcr.io/$PROJECT_ID/dialadrink-frontend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--quiet'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'REACT_APP_API_URL=https://deliveryos-production-backend-805803410802.us-central1.run.app/api,REACT_APP_GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_API_KEY}'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'

substitutions:
  _GOOGLE_MAPS_API_KEY: ''
