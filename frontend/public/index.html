    <!-- Routing fix script -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0d0d0d;
      }

      #root {
        min-height: 100%;
      }

      #startup-loader {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        background-color: #0d0d0d;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 200ms ease;
      }

      #startup-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #startup-loader .spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #39d353;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (function() {
        function hideLoader() {
          var loader = document.getElementById('startup-loader');
          if (!loader || loader.classList.contains('hidden')) return;
          loader.classList.add('hidden');
          setTimeout(function () {
            if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
          }, 220);
        }

        window.addEventListener('load', hideLoader);
        // Safety fallback in case load event is delayed.
        setTimeout(hideLoader, 2500);
      })();

      // Handle client-side routing for all paths
      if (window.location.pathname !== '/' && !window.location.pathname.startsWith('/static/')) {
        // This is a client-side route, let React Router handle it
        console.log('Client-side route detected:', window.location.pathname);
      }
    </script>
  </head>

    <div id="startup-loader" aria-hidden="true">
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
