server {
    listen       0.0.0.0:8080;
    listen       [::]:8080;
    server_name  _;

    # Cloud Run routes the service by Host name. When proxying from this container to the
    # backend service, Host must be the *.run.app hostname — not the public site hostname — or
    # the upstream returns 404 ("The requested URL ... was not found on this server").
    # Preserve the browser host in X-Forwarded-Host so /api/http-redirect can build canonical URLs.
    set $backend_upstream_host "deliveryos-production-backend-805803410802.us-central1.run.app";

    root   /usr/share/nginx/html;
    index  index.html;

    # Proxy API requests to backend (for PesaPal IPN callbacks and other API calls)
    # ^~ stops the single-segment regex location from catching /api/...
    location ^~ /api/ {
        proxy_pass https://deliveryos-production-backend-805803410802.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend_upstream_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Legacy indexed URLs (/products/:slug) → backend 301 to canonical /:category/:slug
    location ~ ^/products/([^/]+)$ {
        proxy_pass https://deliveryos-production-backend-805803410802.us-central1.run.app/api/http-redirect/products/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend_upstream_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Single-segment mistaken product URLs (/mucho-) → 301 when backend resolves; 404 → SPA
    location ~ ^/([^/.]+)$ {
        proxy_pass https://deliveryos-production-backend-805803410802.us-central1.run.app/api/http-redirect/segment/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend_upstream_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        proxy_buffering off;
        error_page 404 = @spa_fallback_no_cache;
    }

    location @spa_fallback_no_cache {
        root /usr/share/nginx/html;
        rewrite ^ /index.html break;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Don't cache HTML files - always serve fresh version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # Don't cache HTML routes
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache static assets with shorter expiration for easier updates
    location /static/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Cache JS/CSS with shorter expiration (1 hour instead of 30 days)
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Cache images longer (they change less frequently)
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}


